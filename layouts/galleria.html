{{define "main"}}

<section  class="mw7 center avenir">
  
  <h2  class="baskerville fw1 ph3 ph0-l">{{- .Title -}}</h2>

   {{ if .Params.album.enable }}
     {{ with .Params.album }}
        {{ range .item }}
          <article class="bt bb b--black-10">
            <a class="db pv4 ph3 ph0-l no-underline black dim" href="{{.link | safeURL}}">
               <div class="flex flex-column flex-row-ns">
                 <div class="pr3-ns mb4 mb0-ns w-100 w-40-ns">
                    <img class="db" src="{{.album_img}}" alt="{{.alt}}">
                 </div>
                 <div class="w-100 w-60-ns pl3-ns">
                    <h3 class="f3 fw1 baskerville mt0 lh-title">{{.title}}</h3>
                 </div>
               </div>
            </a>
          </article>
        {{ end }}
       {{ end }}
     {{end}}
</section>

{{end}}
